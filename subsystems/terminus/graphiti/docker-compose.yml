services:
  neo4j:
    image: neo4j:5.26.0
    container_name: graphiti-neo4j
    ports:
      - "7475:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-graphiti-memory-2026}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:standalone
    container_name: graphiti-mcp
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-graphiti-memory-2026}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-8}
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_URL=https://openrouter.ai/api/v1
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - CONFIG_PATH=/app/mcp/config/config.yaml
    volumes:
      - ./config.yaml:/app/mcp/config/config.yaml:ro
    ports:
      - "8100:8000"
    command: ["uv", "run", "main.py", "--config", "/app/mcp/config/config.yaml", "--database-provider", "neo4j"]
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
